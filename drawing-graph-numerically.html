<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>그래프 그리기 - 상황별 학습</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        /* 태블릿 바운스 및 텍스트 선택 방지 */
        body {
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #canvas-container { position: relative; }
        #math-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            touch-action: none; 
            display: block;
            -webkit-user-drag: none;
        }

        canvas.mode-disabled { cursor: not-allowed; }
        canvas.mode-plot { 
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="blue" stroke="white" stroke-width="2"/></svg>') 12 12, crosshair; 
        }
        canvas.mode-draw {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="blue" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>') 0 24, pointer;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-[100dvh] flex flex-col overflow-hidden">

    <!-- 상단 헤더 (제목 및 상황 선택 버튼) -->
    <header class="bg-white shadow-sm p-2 md:p-3 flex flex-col gap-2 md:gap-3 z-10 shrink-0">
        
        <!-- 타이틀 & 리셋 버튼 라인 -->
        <div class="flex justify-between items-center w-full px-1">
            <h1 class="text-lg md:text-xl font-bold text-blue-800">그래프 그리기</h1>
            <div class="flex gap-2">
                <button id="btn-retry-step" class="px-2 py-1 md:px-3 md:py-1.5 bg-yellow-100 hover:bg-yellow-200 text-yellow-800 border border-yellow-300 rounded text-xs md:text-sm font-bold transition-colors">
                    현재 단계 다시
                </button>
                <button id="btn-reset-all" class="px-2 py-1 md:px-3 md:py-1.5 bg-red-100 hover:bg-red-200 text-red-800 border border-red-300 rounded text-xs md:text-sm font-bold transition-colors">
                    처음부터
                </button>
            </div>
        </div>

        <!-- 가로형 5가지 상황 버튼 -->
        <div id="situation-buttons" class="flex flex-wrap justify-start sm:justify-center gap-1.5 md:gap-2 px-1">
            <!-- JS에서 동적 생성 -->
        </div>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-1 flex flex-col overflow-hidden p-1.5 md:p-2 gap-1.5 md:gap-2 relative">
        
        <!-- 상단: 상황 설명 영역 -->
        <div class="bg-yellow-50 rounded-lg shadow-sm p-1.5 md:p-2 shrink-0 border border-yellow-200 flex items-center gap-2 md:gap-3">
            <div id="situation-icon" class="text-xl md:text-2xl shrink-0 drop-shadow-md ml-1 md:ml-2"></div>
            <p id="situation-desc" class="text-xs md:text-sm text-black leading-snug font-semibold m-0 flex-1"></p>
        </div>

        <!-- 중단: 가로형 표 (세로 길이 압축) -->
        <div class="bg-white rounded-lg shadow-sm p-1 md:p-2 shrink-0 flex flex-row items-center gap-2 border border-gray-200">
            <div class="flex-1 w-full overflow-x-auto no-scrollbar">
                <table class="w-full text-center border-collapse text-[11px] md:text-xs table-fixed min-w-[280px]">
                    <tr id="row-x">
                        <!-- JS에서 동적 생성됨 -->
                    </tr>
                    <tr id="row-y">
                        <!-- JS에서 동적 생성됨 -->
                    </tr>
                </table>
            </div>
            <!-- 표 채우기 버튼 -->
            <div id="btn-container-reveal" class="shrink-0 flex justify-center px-1">
                <button id="btn-action" class="px-2 py-1.5 md:px-3 md:py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs md:text-sm font-bold rounded-lg shadow-md transition-transform transform hover:scale-105 flex items-center justify-center gap-1 whitespace-nowrap">
                    <span>표 채우기</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                </button>
            </div>
        </div>

        <!-- 하단: 좌표평면 캔버스 (크기 조절 반영) -->
        <div class="flex-1 bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden" id="canvas-container">
            <canvas id="math-canvas" class="bg-gray-50 mode-disabled"></canvas>
            
            <!-- 팝업 오버레이 -->
            <div id="overlay" class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center p-4 transition-opacity duration-300 z-20 hidden opacity-0">
                <div id="overlay-message" class="bg-white px-5 py-4 md:px-6 md:py-5 rounded-2xl shadow-2xl text-center max-w-md transform scale-90 transition-transform duration-300 border-4 border-blue-400">
                    <p id="overlay-text" class="text-sm md:text-base font-bold text-gray-800 leading-relaxed"></p>
                </div>
            </div>
        </div>

    </main>

<script>
    /* =====================================================================
       [사운드 효과 모듈] - "띠로링~" 성공 효과음 생성
       ===================================================================== */
    function playSuccessSound() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const audioCtx = new AudioContext();
            const playNote = (frequency, startTime, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(frequency, startTime);
                
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.3, startTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(startTime);
                osc.stop(startTime + duration);
            };

            const now = audioCtx.currentTime;
            playNote(659.25, now, 0.15);         // 미 (E5)
            playNote(830.61, now + 0.12, 0.15);  // 솔# (G#5)
            playNote(1318.51, now + 0.24, 0.4);  // 시 (B5)
            
        } catch (e) {
            console.error("Audio playback failed:", e);
        }
    }

    /* =====================================================================
       [데이터 설정 영역] 
       ===================================================================== */
    const CONFIG = {
        situations: [
            {
                title: "1. 🧸 곰돌이 인형",
                icon: "🧸",
                desc: "한 개에 $2$만 원 하는 곰돌이 인형의 개수를 $x$개, 가격을 $y$만 원이라 할 때, $x$와 $y$ 사이의 관계를 나타내봅시다.",
                xLabel: "$x$ (개수 개)", yLabel: "$y$ (가격 만원)",
                data: [
                    { x: 1, y: 2, hidden: false },
                    { x: 2, y: 4, hidden: false },
                    { x: 3, y: 6, hidden: true },
                    { x: 4, y: 8, hidden: true },
                    { x: 5, y: 10, hidden: true },
                    { x: 6, y: 12, hidden: true }
                ],
                axis: { xMin: -1, xMax: 7, yMin: -2, yMax: 14 },
                grid: { xStep: 1, yStep: 2 }
            },
            {
                title: "2. 🍅 토마토 키",
                icon: "🍅",
                desc: "토마토 싹을 키우며 일주일 간격으로 키를 쟀습니다. 관찰한 지 $x$주 후 토마토의 키를 $y\\mathrm{cm}$라 할 때, $x$와 $y$ 사이의 관계를 나타내봅시다.",
                xLabel: "$x$ (시간 주)", yLabel: "$y$ (키 cm)",
                data: [
                    { x: 0, y: 2, hidden: false },
                    { x: 1, y: 4, hidden: false },
                    { x: 2, y: 5, hidden: true },
                    { x: 3, y: 7, hidden: true },
                    { x: 4, y: 11, hidden: true }
                ],
                axis: { xMin: -1, xMax: 5, yMin: -1, yMax: 12 },
                grid: { xStep: 1, yStep: 1 }
            },
            {
                title: "3. ☕ 커피의 온도",
                icon: "☕",
                desc: "뜨겁게 끓인 커피를 식히기 시작한 지 $x$분 후의 커피의 온도 $y^\\circ\\mathrm{C}$를 측정하여 나타낸 것입니다. $x$와 $y$ 사이의 관계를 나타내봅시다.",
                xLabel: "$x$ (시간 분)", yLabel: "$y$ (온도 $^\\circ\\mathrm{C}$)",
                data: [
                    { x: 2, y: 70, hidden: false },
                    { x: 4, y: 50, hidden: false },
                    { x: 6, y: 40, hidden: true },
                    { x: 8, y: 35, hidden: true },
                    { x: 10, y: 30, hidden: true }
                ],
                axis: { xMin: -1, xMax: 11, yMin: -10, yMax: 80 },
                grid: { xStep: 1, yStep: 10 }
            },
            {
                title: "4. 🔢 합이 9인 두 자연수",
                icon: "🔢",
                desc: "합이 $9$인 두 자연수 $x$와 $y$에 대하여 순서쌍 $(x, y)$를 그래프로 나타내봅시다.",
                xLabel: "$x$ (자연수)", yLabel: "$y$ (자연수)",
                data: [
                    { x: 1, y: 8, hidden: false },
                    { x: 2, y: 7, hidden: false },
                    { x: 3, y: 6, hidden: true },
                    { x: 4, y: 5, hidden: true },
                    { x: 5, y: 4, hidden: true },
                    { x: 6, y: 3, hidden: true },
                    { x: 7, y: 2, hidden: true },
                    { x: 8, y: 1, hidden: true }
                ],
                axis: { xMin: -1, xMax: 9, yMin: -1, yMax: 9 },
                grid: { xStep: 1, yStep: 1 }
            },
            {
                title: "5. 🌸 꽃밭의 넓이",
                icon: "🌸",
                desc: "넓이가 $36\\mathrm{m}^2$인 직사각형 모양의 꽃밭이 있습니다. 가로의 길이를 $x\\mathrm{m}$, 세로의 길이를 $y\\mathrm{m}$라 할 때, $x$와 $y$ 사이의 관계를 나타내봅시다.",
                xLabel: "$x$ (가로 m)", yLabel: "$y$ (세로 m)",
                data: [
                    { x: 2, y: 18, hidden: false },
                    { x: 3, y: 12, hidden: false },
                    { x: 4, y: 9, hidden: true },
                    { x: 6, y: 6, hidden: true },
                    { x: 9, y: 4, hidden: true },
                    { x: 12, y: 3, hidden: true }
                ],
                axis: { xMin: -1, xMax: 13, yMin: -2, yMax: 20 },
                grid: { xStep: 1, yStep: 2 }
            }
        ],
        snapTolerancePx: 50 
    };

    /* =====================================================================
       [시스템 상태 변수]
       ===================================================================== */
    let currentSitIdx = 0;
    
    let state = {
        step: 1, 
        hiddenIndices: [], 
        revealCount: 0,    
        
        userPoints: [], 
        
        connectedEdges: new Set(),
        isDragging: false,
        dragStartMath: null,
        dragCurrentMath: null
    };

    const canvas = document.getElementById('math-canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    const btnAction = document.getElementById('btn-action');
    const btnContainer = document.getElementById('btn-container-reveal');
    const overlay = document.getElementById('overlay');
    const overlayBox = document.getElementById('overlay-message');
    const overlayText = document.getElementById('overlay-text');

    let renderParams = { ppuX: 0, ppuY: 0, offsetX: 0, offsetY: 0 };
    let overlayTimer = null;

    /* ---------------------------------------------------------------------
       초기화 및 공통 로직
       --------------------------------------------------------------------- */
    function init() {
        // 상단 가로 버튼 생성 (드롭다운 대체)
        const btnWrapper = document.getElementById('situation-buttons');
        btnWrapper.innerHTML = '';
        CONFIG.situations.forEach((sit, idx) => {
            const btn = document.createElement('button');
            btn.id = `sit-btn-${idx}`;
            // 모바일에서 너무 길어지지 않게 제목 그대로 사용
            btn.textContent = sit.title;
            btn.className = "px-3 py-1 text-xs md:text-sm rounded-full border border-gray-300 bg-white text-gray-700 font-semibold hover:bg-blue-50 hover:text-blue-700 transition-colors";
            btn.onclick = () => loadSituation(idx);
            btnWrapper.appendChild(btn);
        });
        
        document.getElementById('btn-reset-all').addEventListener('click', () => loadSituation(currentSitIdx));
        document.getElementById('btn-retry-step').addEventListener('click', retryCurrentStep);
        
        window.addEventListener('resize', resizeCanvas);
        canvas.addEventListener('mousedown', handleInteractStart);
        window.addEventListener('mousemove', handleInteractMove);
        window.addEventListener('mouseup', handleInteractEnd);
        canvas.addEventListener('touchstart', handleInteractStart, {passive: false});
        window.addEventListener('touchmove', handleInteractMove, {passive: false});
        window.addEventListener('touchend', handleInteractEnd);

        overlay.addEventListener('click', () => hideOverlay());

        setTimeout(() => loadSituation(0), 50); 
    }

    function loadSituation(index) {
        currentSitIdx = index;
        const sit = CONFIG.situations[currentSitIdx];
        
        // 활성화된 버튼 스타일 지정
        CONFIG.situations.forEach((_, idx) => {
            const btn = document.getElementById(`sit-btn-${idx}`);
            if(btn) {
                if (idx === index) {
                    btn.className = "px-3 py-1 text-xs md:text-sm rounded-full border-2 border-blue-600 bg-blue-600 text-white font-bold shadow-sm transition-colors";
                } else {
                    btn.className = "px-3 py-1 text-xs md:text-sm rounded-full border border-gray-300 bg-white text-gray-700 font-semibold hover:bg-blue-50 hover:text-blue-700 transition-colors";
                }
            }
        });

        state.hiddenIndices = [];
        sit.data.forEach((d, i) => { if(d.hidden) state.hiddenIndices.push(i); });
        
        initStep1();
        
        document.getElementById('situation-icon').innerHTML = sit.icon;
        document.getElementById('situation-desc').innerHTML = sit.desc;
        
        renderMathInElement(document.body, {delimiters: [{left: "$", right: "$", display: false}], throwOnError: false});
        resizeCanvas();
    }

    function initStep1() {
        state.step = 1;
        state.revealCount = 0;
        state.userPoints = [];
        state.connectedEdges.clear();
        state.isDragging = false;
        
        buildHorizontalTable();
        
        btnAction.innerHTML = `<span>표 채우기</span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>`;
        btnAction.className = "px-2 py-1.5 md:px-3 md:py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs md:text-sm font-bold rounded-lg shadow-md transition-transform transform hover:scale-105 flex items-center justify-center gap-1 whitespace-nowrap";
        btnAction.onclick = revealNextY;
        
        btnContainer.style.display = 'flex';
        canvas.className = 'mode-disabled bg-gray-50';
        
        showOverlay("상황 설명을 읽고 표를 채워봅시다", 'default', 2500);
        if(ctx) render(); 
    }

    function retryCurrentStep() {
        if(state.step === 1) {
            initStep1();
        } else if(state.step === 2) {
            state.userPoints = [];
            showOverlay("표에 나타난 순서쌍을 그래프 위에 순서대로 찍어 나타내봅시다", 'default', 2500);
            render();
        } else if(state.step >= 3) {
            state.step = 3;
            state.connectedEdges.clear();
            state.isDragging = false;
            canvas.classList.remove('mode-plot');
            canvas.classList.add('mode-draw');
            showOverlay("훌륭해요! 마지막으로 점들을 선으로 이어 그래프로 나타내봅시다.", 'default', 2500);
            render();
        }
    }

    /* ---------------------------------------------------------------------
       UI 오버레이(팝업) 기능
       --------------------------------------------------------------------- */
    function showOverlay(htmlText, type = 'default', duration = 2000) {
        overlayText.innerHTML = htmlText;
        
        overlayBox.className = "bg-white px-5 py-4 rounded-2xl shadow-2xl text-center max-w-md transform scale-100 transition-transform duration-300 border-4 ";
        if (type === 'error') {
            overlayBox.className += "border-red-400";
            overlayText.className = "text-sm md:text-base font-bold text-red-600 leading-relaxed";
        } else if (type === 'success') {
            overlayBox.className += "border-green-400";
            overlayText.className = "text-sm md:text-base font-bold text-green-700 leading-relaxed";
        } else {
            overlayBox.className += "border-blue-400";
            overlayText.className = "text-sm md:text-base font-bold text-blue-800 leading-relaxed";
        }

        renderMathInElement(overlayText, {delimiters: [{left: "$", right: "$", display: false}], throwOnError: false});
        
        overlay.classList.remove('hidden');
        void overlay.offsetWidth; 
        overlay.classList.remove('opacity-0');
        
        if (overlayTimer) clearTimeout(overlayTimer);
        if (duration > 0) {
            overlayTimer = setTimeout(() => { hideOverlay(); }, duration);
        }
    }

    function hideOverlay() {
        overlay.classList.add('opacity-0');
        overlayBox.classList.replace('scale-100', 'scale-90');
        
        setTimeout(() => {
            if (overlay.classList.contains('opacity-0')) {
                overlay.classList.add('hidden');
            }
        }, 300);
    }

    /* ---------------------------------------------------------------------
       가로형 표 빌드 및 제어 (상하 패딩 압축)
       --------------------------------------------------------------------- */
    function buildHorizontalTable() {
        const sit = CONFIG.situations[currentSitIdx];
        const rowX = document.getElementById('row-x');
        const rowY = document.getElementById('row-y');
        
        // padding y를 py-0.5 로 줄여서 표 높이를 슬림하게
        rowX.innerHTML = `<th class="bg-gray-200 border border-gray-400 py-0.5 px-1 w-14 md:w-20 break-keep text-black font-normal">${sit.xLabel}</th>`;
        rowY.innerHTML = `<th class="bg-gray-200 border border-gray-400 py-0.5 px-1 w-14 md:w-20 break-keep text-black font-normal">${sit.yLabel}</th>`;
        
        sit.data.forEach((row, index) => {
            rowX.innerHTML += `<td id="td-x-${index}" class="bg-white border border-gray-300 py-0.5 px-1 text-black font-normal">$${row.x}$</td>`;
            let yContent = row.hidden ? `<span class="text-black font-normal">?</span>` : `$${row.y}$`;
            rowY.innerHTML += `<td id="td-y-${index}" class="bg-white border border-gray-300 py-0.5 px-1 font-medium">${yContent}</td>`;
        });
        
        renderMathInElement(rowX, {delimiters: [{left: "$", right: "$", display: false}]});
        renderMathInElement(rowY, {delimiters: [{left: "$", right: "$", display: false}]});
    }

    function revealNextY() {
        if (state.step !== 1) return;
        if (state.revealCount < state.hiddenIndices.length) {
            const sit = CONFIG.situations[currentSitIdx];
            const targetIdx = state.hiddenIndices[state.revealCount];
            const tdY = document.getElementById(`td-y-${targetIdx}`);
            
            tdY.innerHTML = `<span class="text-blue-600 font-normal">$${sit.data[targetIdx].y}$</span>`;
            renderMathInElement(tdY, {delimiters: [{left: "$", right: "$", display: false}]});
            
            state.revealCount++;
            
            if (state.revealCount >= state.hiddenIndices.length) {
                state.step = 2;
                
                btnAction.innerHTML = `<span>점 정답 확인</span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>`;
                btnAction.className = "px-2 py-1.5 md:px-3 md:py-1.5 bg-green-600 hover:bg-green-700 text-white text-xs md:text-sm font-bold rounded-lg shadow-md transition-transform transform hover:scale-105 flex items-center justify-center gap-1 whitespace-nowrap";
                btnAction.onclick = checkPlotting;

                canvas.classList.remove('mode-disabled');
                canvas.classList.add('mode-plot');
                showOverlay("표에 나타난 순서쌍을 그래프 위에 순서대로 찍어 나타내봅시다.<br><span class='text-xs font-normal mt-1 block text-green-900'>(모두 찍은 후 <b>[점 정답 확인]</b> 버튼 클릭)</span>", 'success', 5000);
            }
        }
    }

    function checkPlotting() {
        const sit = CONFIG.situations[currentSitIdx];
        let correctCount = 0;
        
        sit.data.forEach(target => {
            const found = state.userPoints.some(pt => pt.x === target.x && pt.y === target.y);
            if (found) correctCount++;
        });

        if (correctCount === sit.data.length && state.userPoints.length === sit.data.length) {
            state.step = 3;
            btnContainer.style.display = 'none'; 
            canvas.classList.remove('mode-plot');
            canvas.classList.add('mode-draw');
            showOverlay("훌륭해요! 마지막으로 점들을 선으로 이어 그래프로 나타내봅시다.", 'success', 4000);
        } else {
            if (state.userPoints.length > sit.data.length) {
                showOverlay("필요 없는 점이 더 찍혀있어요.<br>잘못 찍은 점은 다시 한 번 눌러서 지워주세요.", "error", 4000);
            } else if (correctCount < sit.data.length && state.userPoints.length === sit.data.length) {
                showOverlay("위치가 틀린 점이 있어요.<br>잘못 찍은 점을 다시 누르면 지워집니다.", "error", 4000);
            } else {
                showOverlay("아직 찍지 않은 점이 있어요.<br>표에 있는 순서쌍을 빠짐없이 모두 찾아 찍어주세요.", "error", 4000);
            }
        }
    }

    /* ---------------------------------------------------------------------
       캔버스 렌더링 엔진 (패딩을 늘려 전체 그래프 크기를 알맞게 축소)
       --------------------------------------------------------------------- */
    function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = container.getBoundingClientRect(); 
        if(rect.width === 0 || rect.height === 0) return; 
        
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr); 
        
        const sit = CONFIG.situations[currentSitIdx];
        const mathWidth = sit.axis.xMax - sit.axis.xMin;
        const mathHeight = sit.axis.yMax - sit.axis.yMin;
        
        // 캔버스 내부에 여백(패딩)을 훨씬 더 많이 확보하여 그래프를 살짝 작게 그립니다.
        const padX = mathWidth * 0.12;
        const padY = mathHeight * 0.15; 

        renderParams.ppuX = rect.width / (mathWidth + padX * 2);
        renderParams.ppuY = rect.height / (mathHeight + padY * 2);
        
        renderParams.offsetX = -(sit.axis.xMin - padX) * renderParams.ppuX;
        renderParams.offsetY = (sit.axis.yMax + padY) * renderParams.ppuY; 

        render();
    }

    function mathToCanvas(mathX, mathY) {
        return {
            x: renderParams.offsetX + (mathX * renderParams.ppuX),
            y: renderParams.offsetY - (mathY * renderParams.ppuY)
        };
    }

    function canvasToMath(canvasX, canvasY) {
        return {
            x: (canvasX - renderParams.offsetX) / renderParams.ppuX,
            y: (renderParams.offsetY - canvasY) / renderParams.ppuY
        };
    }

    function getEventPos(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX, clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length > 0) {
             clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY;
        }
        return { 
            x: clientX - rect.left, 
            y: clientY - rect.top 
        };
    }

    function render() {
        if(!ctx) return;
        const width = canvas.getBoundingClientRect().width;
        const height = canvas.getBoundingClientRect().height;
        ctx.clearRect(0, 0, width, height);
        
        drawGridAndAxes();
        drawLines();
        drawPoints();
        
        if (state.step === 3 && state.isDragging && state.dragCurrentMath) {
            const startPx = mathToCanvas(state.dragStartMath.x, state.dragStartMath.y);
            const currentPx = mathToCanvas(state.dragCurrentMath.x, state.dragCurrentMath.y);
            ctx.beginPath();
            ctx.moveTo(startPx.x, startPx.y);
            ctx.lineTo(currentPx.x, currentPx.y);
            ctx.strokeStyle = "rgba(59, 130, 246, 0.6)"; 
            ctx.lineWidth = 4; ctx.setLineDash([8, 4]); ctx.stroke(); ctx.setLineDash([]);
        }
    }

    function drawGridAndAxes() {
        const sit = CONFIG.situations[currentSitIdx];
        
        ctx.lineWidth = 1;
        ctx.strokeStyle = "#D1D5DB"; 
        
        ctx.font = "bold 13px sans-serif"; 
        ctx.fillStyle = "#000000"; 
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        for (let y = 0; y <= sit.axis.yMax; y += sit.grid.yStep) drawYGrid(y, sit);
        for (let y = -sit.grid.yStep; y >= sit.axis.yMin; y -= sit.grid.yStep) drawYGrid(y, sit);

        for (let x = 0; x <= sit.axis.xMax; x += sit.grid.xStep) drawXGrid(x, sit);
        for (let x = -sit.grid.xStep; x >= sit.axis.xMin; x -= sit.grid.xStep) drawXGrid(x, sit);

        ctx.lineWidth = 2.5;
        ctx.strokeStyle = "#000000"; 
        ctx.fillStyle = "#000000";

        const xMinPx = mathToCanvas(sit.axis.xMin, 0);
        const xMaxPx = mathToCanvas(sit.axis.xMax, 0);
        ctx.beginPath(); ctx.moveTo(xMinPx.x, xMinPx.y); ctx.lineTo(xMaxPx.x, xMaxPx.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(xMaxPx.x, xMaxPx.y); ctx.lineTo(xMaxPx.x - 8, xMaxPx.y - 4); ctx.lineTo(xMaxPx.x - 8, xMaxPx.y + 4); ctx.fill();

        const yMinPx = mathToCanvas(0, sit.axis.yMin);
        const yMaxPx = mathToCanvas(0, sit.axis.yMax);
        ctx.beginPath(); ctx.moveTo(yMinPx.x, yMinPx.y); ctx.lineTo(yMaxPx.x, yMaxPx.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(yMaxPx.x, yMaxPx.y); ctx.lineTo(yMaxPx.x - 4, yMaxPx.y + 8); ctx.lineTo(yMaxPx.x + 4, yMaxPx.y + 8); ctx.fill();

        const originPx = mathToCanvas(0, 0);
        ctx.textAlign = "right"; ctx.textBaseline = "top";
        ctx.fillText("O", originPx.x - 6, originPx.y + 6);
    }

    function drawXGrid(x, sit) {
        const px = mathToCanvas(x, 0).x;
        ctx.beginPath(); ctx.moveTo(px, mathToCanvas(0, sit.axis.yMin).y); ctx.lineTo(px, mathToCanvas(0, sit.axis.yMax).y); ctx.stroke();
        if (x !== 0) {
            ctx.fillStyle = "#000000"; 
            ctx.fillText(x, px, mathToCanvas(0, 0).y + 14);
        }
    }

    function drawYGrid(y, sit) {
        const py = mathToCanvas(0, y).y;
        ctx.beginPath(); ctx.moveTo(mathToCanvas(sit.axis.xMin, 0).x, py); ctx.lineTo(mathToCanvas(sit.axis.xMax, 0).x, py); ctx.stroke();
        if (y !== 0) {
            ctx.fillStyle = "#000000"; 
            ctx.textAlign = "right";
            ctx.fillText(y, mathToCanvas(0, 0).x - 8, py);
            ctx.textAlign = "center";
        }
    }

    function drawLines() {
        if (state.connectedEdges.size === 0) return;
        const sit = CONFIG.situations[currentSitIdx];
        ctx.save();
        ctx.lineWidth = 3.5; ctx.strokeStyle = "#2563EB"; ctx.lineJoin = "round"; ctx.lineCap = "round";
        
        state.connectedEdges.forEach(edgeIdx => {
            const p1 = mathToCanvas(sit.data[edgeIdx].x, sit.data[edgeIdx].y);
            const p2 = mathToCanvas(sit.data[edgeIdx + 1].x, sit.data[edgeIdx + 1].y);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        });
        ctx.restore();
    }

    function drawPoints() {
        ctx.font = "bold 13px sans-serif";
        state.userPoints.forEach((pt) => {
            const px = mathToCanvas(pt.x, pt.y);
            ctx.beginPath(); ctx.arc(px.x, px.y, 6, 0, 2 * Math.PI);
            ctx.fillStyle = "#2563EB"; ctx.fill();
            
            ctx.fillStyle = "#1E3A8A"; ctx.textAlign = "left"; ctx.textBaseline = "bottom";
            ctx.fillText(`(${pt.x}, ${pt.y})`, px.x + 8, px.y - 8);
        });
    }

    /* ---------------------------------------------------------------------
       인터랙션(이벤트) 처리
       --------------------------------------------------------------------- */
    function handleInteractStart(e) {
        if (state.step === 4) return;
        
        if (state.step === 1) {
            showOverlay("위의 <b>[표 채우기]</b> 버튼을 먼저 눌러<br>표를 완성해주세요!", 'error', 2500);
            return;
        }
        
        if (e.type === 'touchstart') {
            if(e.target.tagName !== 'SELECT' && e.target.tagName !== 'BUTTON') {
                e.preventDefault();
            }
        }
        
        const clickPx = getEventPos(e);
        const mathPos = canvasToMath(clickPx.x, clickPx.y);

        if (state.step === 2) {
            let foundIdx = -1;
            for(let i=0; i<state.userPoints.length; i++){
                const ptPx = mathToCanvas(state.userPoints[i].x, state.userPoints[i].y);
                const dist = Math.hypot(clickPx.x - ptPx.x, clickPx.y - ptPx.y);
                if (dist <= 30) {
                    foundIdx = i; break;
                }
            }

            if (foundIdx !== -1) {
                state.userPoints.splice(foundIdx, 1);
            } else {
                const sit = CONFIG.situations[currentSitIdx];
                let snappedPt = null;
                
                for (let pt of sit.data) {
                    const ptPx = mathToCanvas(pt.x, pt.y);
                    if (Math.hypot(clickPx.x - ptPx.x, clickPx.y - ptPx.y) <= 40) {
                        snappedPt = { x: pt.x, y: pt.y };
                        break;
                    }
                    const swappedPx = mathToCanvas(pt.y, pt.x);
                    if (Math.hypot(clickPx.x - swappedPx.x, clickPx.y - swappedPx.y) <= 40) {
                        snappedPt = { x: pt.y, y: pt.x };
                        break;
                    }
                }
                
                if (!snappedPt) {
                    const snapX = Math.round(mathPos.x);
                    const snapY = Math.round(mathPos.y);
                    snappedPt = { x: snapX, y: snapY };
                }
                
                const alreadyExists = state.userPoints.some(p => p.x === snappedPt.x && p.y === snappedPt.y);
                if (!alreadyExists) {
                    if (state.userPoints.length < sit.data.length + 3) {
                        state.userPoints.push(snappedPt);
                    } else {
                        showOverlay("점이 너무 많이 찍혀있어요!<br>잘못 찍은 점은 다시 한 번 눌러 지워주세요.", "error", 2500);
                    }
                }
            }
            render();
            
        } else if (state.step === 3) {
            const sit = CONFIG.situations[currentSitIdx];
            let closestPt = null;
            let minDist = Infinity;
            
            sit.data.forEach((pt) => {
                const ptPx = mathToCanvas(pt.x, pt.y);
                const dist = Math.hypot(clickPx.x - ptPx.x, clickPx.y - ptPx.y);
                if (dist < minDist) {
                    minDist = dist;
                    closestPt = pt;
                }
            });
            
            if (closestPt && minDist <= 50) {
                state.isDragging = true;
                state.dragStartMath = { x: closestPt.x, y: closestPt.y };
                state.dragCurrentMath = mathPos; 
                render();
            }
        }
    }

    function handleInteractMove(e) {
        if (state.step !== 3 || !state.isDragging) return;
        if (e.type === 'touchmove') e.preventDefault();
        const clickPx = getEventPos(e);
        state.dragCurrentMath = canvasToMath(clickPx.x, clickPx.y);
        render(); 
    }

    function handleInteractEnd(e) {
        if (state.step !== 3 || !state.isDragging) return;
        if (e.type === 'touchend' && e.cancelable) e.preventDefault();
        
        const clickPx = getEventPos(e);
        const sit = CONFIG.situations[currentSitIdx];
        
        let closestPt = null;
        let minDist = Infinity;
        let endIdx = -1;

        sit.data.forEach((pt, idx) => {
            const ptPx = mathToCanvas(pt.x, pt.y);
            const dist = Math.hypot(clickPx.x - ptPx.x, clickPx.y - ptPx.y);
            if(dist < minDist) { 
                minDist = dist; 
                closestPt = pt;
                endIdx = idx; 
            }
        });
        
        let startIdx = -1;
        sit.data.forEach((pt, idx) => {
            if (pt.x === state.dragStartMath.x && pt.y === state.dragStartMath.y) startIdx = idx;
        });
        
        if (startIdx !== -1 && endIdx !== -1 && startIdx !== endIdx && minDist <= 50) {
            if (Math.abs(startIdx - endIdx) === 1) {
                const edgeIndex = Math.min(startIdx, endIdx); 
                
                if (!state.connectedEdges.has(edgeIndex)) {
                    state.connectedEdges.add(edgeIndex); 
                    
                    if (state.connectedEdges.size === sit.data.length - 1) {
                        state.step = 4;
                        canvas.classList.remove('mode-draw');
                        
                        playSuccessSound();
                        showOverlay("🎉 <b>완벽해요!</b><br>주어진 상황을 아름다운 그래프로 나타냈네요!!", 'success', 0);
                    }
                }
            } else {
                showOverlay("선은 건너뛰지 말고, <b>바로 옆에 있는 점</b>끼리<br>차례대로 이어서 연결해야 해요.", 'error', 3000);
            }
        }
        
        state.isDragging = false;
        state.dragStartMath = null;
        state.dragCurrentMath = null;
        render();
    }

    document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
