<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사용 수업 제어 및 모니터링</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

  // 🔥 선생님의 파이어베이스 설정 정보로 수정해 주세요!
        const firebaseConfig = {
            apiKey: "AIzaSyCdTOKdNG0NXOGVt8Rhn6f6dYr7oc_XZ0A",
            authDomain: "meaning-of-graphs.firebaseapp.com",
            databaseURL: "https://meaning-of-graphs-default-rtdb.firebaseio.com",
            projectId: "meaning-of-graphs",
            storageBucket: "meaning-of-graphs.firebasestorage.app",
            messagingSenderId: "908366432588",
            appId: "1:908366432588:web:0596ebd12cfcbf63f227e9"
        };
        
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const classStepRef = ref(database, 'currentStep');
        const studentsRef = ref(database, 'students');

        // 1. 현재 진행 단계 시각화
        onValue(classStepRef, (snapshot) => {
            const currentStep = snapshot.val() || 1;
            document.querySelectorAll('.btn-step').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'scale-105', 'ring-4', 'ring-blue-300');
                btn.classList.add('bg-white', 'text-slate-700');
            });
            const activeBtn = document.getElementById(`btn-${currentStep}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-white', 'text-slate-700');
                activeBtn.classList.add('bg-blue-600', 'text-white', 'scale-105', 'ring-4', 'ring-blue-300');
            }
        });

        // 단계 변경 함수
        window.changeStep = function(stepNumber) {
            set(classStepRef, stepNumber).catch((err) => alert("에러: " + err.message));
        };

        // 2. 실시간 학생 모니터링 (딴짓 감지 핵심)
        const studentListEl = document.getElementById('student-list');
        const totalCountEl = document.getElementById('total-count');
        const awayCountEl = document.getElementById('away-count');

        onValue(studentsRef, (snapshot) => {
            studentListEl.innerHTML = "";
            const data = snapshot.val();
            
            if (!data) {
                studentListEl.innerHTML = `<p class="text-sm text-slate-400 text-center py-4">접속한 학생이 없습니다.</p>`;
                totalCountEl.innerText = "0";
                awayCountEl.innerText = "0";
                return;
            }

            const students = Object.values(data);
            // 학번 순으로 정렬
            students.sort((a, b) => String(a.id).localeCompare(String(b.id)));

            let total = students.length;
            let away = 0;

            students.forEach(student => {
                const isAway = student.status === "away";
                if (isAway) away++;

                // 학생 카드 생성
                const item = document.createElement('div');
                item.className = `p-3 rounded-xl border flex justify-between items-center transition-all ${
                    isAway 
                    ? 'bg-red-50 border-red-200 text-red-700 animate-pulse font-bold' 
                    : 'bg-slate-50 border-slate-100 text-slate-700'
                }`;

                item.innerHTML = `
                    <div>
                        <span class="text-xs bg-white border px-1.5 py-0.5 rounded mr-1 shadow-sm text-slate-500">${student.id}</span>
                        <span class="text-base">${student.name}</span>
                    </div>
                    <span class="text-xs font-bold px-2 py-0.5 rounded-full ${isAway ? 'bg-red-500 text-white' : 'bg-green-500 text-white'}">
                        ${isAway ? '딴짓 중!' : '참여 중'}
                    </span>
                `;
                studentListEl.appendChild(item);
            });

            totalCountEl.innerText = total;
            awayCountEl.innerText = away;
        });
    </script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-200 h-fit">
            <h1 class="text-xl font-black text-slate-800 mb-1">수업 화면 실시간 리모컨</h1>
            <p class="text-xs text-slate-400 mb-6">원하는 단계를 누르면 전 학생의 화면이 강제 전환됩니다.</p>

<div class="space-y-3">
                <button id="btn-1" onclick="changeStep(1)" class="btn-step w-full py-4 px-5 text-left font-bold rounded-xl border border-slate-200 shadow-sm transition-all flex justify-between items-center">
                    <span>1단계. 그래프 개형 탐구</span>
                    <span class="text-xs px-2 py-0.5 bg-slate-100 text-slate-400 rounded">이동</span>
                </button>
                <button id="btn-2" onclick="changeStep(2)" class="btn-step w-full py-4 px-5 text-left font-bold rounded-xl border border-slate-200 shadow-sm transition-all flex justify-between items-center">
                    <span>2단계. 물통에 물 채우기</span>
                    <span class="text-xs px-2 py-0.5 bg-slate-100 text-slate-400 rounded">이동</span>
                </button>
                <button id="btn-3" onclick="changeStep(3)" class="btn-step w-full py-4 px-5 text-left font-bold rounded-xl border border-slate-200 shadow-sm transition-all flex justify-between items-center">
                    <span>3단계. 그래프 수치적 접근</span>
                    <span class="text-xs px-2 py-0.5 bg-slate-100 text-slate-400 rounded">이동</span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-200 flex flex-col max-h-[85vh]">
            <h2 class="text-xl font-black text-slate-800 mb-1">실시간 학생 모니터링</h2>
            <p class="text-xs text-slate-400 mb-4">화면을 이탈한 학생은 실시간으로 빨간색으로 표시됩니다.</p>
            
            <div class="grid grid-cols-2 gap-4 mb-4 text-center">
                <div class="bg-slate-50 border rounded-xl p-2.5">
                    <p class="text-xs text-slate-400 font-bold">총 접속 학생</p>
                    <p id="total-count" class="text-xl font-black text-slate-700">0</p>
                </div>
                <div class="bg-red-50 border border-red-100 rounded-xl p-2.5">
                    <p class="text-xs text-red-400 font-bold">⚠️ 현재 딴짓 중</p>
                    <p id="away-count" class="text-xl font-black text-red-600">0</p>
                </div>
            </div>

            <div id="student-list" class="flex-1 overflow-y-auto space-y-2 pr-1 max-h-[50vh]">
                <p class="text-sm text-slate-400 text-center py-4">데이터를 연결하고 있습니다...</p>
            </div>
        </div>

    </div>
</body>
</html>
