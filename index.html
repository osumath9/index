<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 실시간 탐구 수업</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // 🔥 선생님의 파이어베이스 설정 정보
        const firebaseConfig = {
            apiKey: "AIzaSyCdTOKdNG0NXOGVt8Rhn6f6dYr7oc_XZ0A",
            authDomain: "meaning-of-graphs.firebaseapp.com",
            databaseURL: "https://meaning-of-graphs-default-rtdb.firebaseio.com",
            projectId: "meaning-of-graphs",
            storageBucket: "meaning-of-graphs.firebasestorage.app",
            messagingSenderId: "908366432588",
            appId: "1:908366432588:web:0596ebd12cfcbf63f227e9"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        let studentId = ""; 
        let studentName = "";
        let myStatusRef = null;

        // 로그인 확인 및 상태 관리 시작
        window.startClass = function() {
            const idInput = document.getElementById('student-id').value.trim();
            const nameInput = document.getElementById('student-name').value.trim();

            if (!idInput || !nameInput) {
                alert("학번과 이름을 모두 입력해 주세요.");
                return;
            }

            studentId = idInput;
            studentName = nameInput;
            
            // 학생 고유 키 생성
            const studentKey = `${studentId}_${studentName}`;
            myStatusRef = ref(database, `students/${studentKey}`);

            // 로그인 모달 닫고 로딩/대기 화면 표시
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            // 1. 온라인 상태 설정
            set(myStatusRef, {
                id: studentId,
                name: studentName,
                status: "online",
                lastActive: Date.now()
            });
            onDisconnect(myStatusRef).remove();

            // 2. 실시간 화면 전환 감지 이벤트
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    set(myStatusRef, { id: studentId, name: studentName, status: "away", lastActive: Date.now() });
                } else {
                    set(myStatusRef, { id: studentId, name: studentName, status: "online", lastActive: Date.now() });
                }
            });

            // 3. 교사 리모컨 신호 감시
            const classStepRef = ref(database, 'currentStep');
            const loadingEl = document.getElementById('loading');
const frames = {
                1: document.getElementById('frame-step1'),
                2: document.getElementById('frame-step2'),
                3: document.getElementById('frame-step3'),
                4: document.getElementById('frame-step4') 
            };

            onValue(classStepRef, (snapshot) => {
                const step = snapshot.val() || 1;
                loadingEl.classList.add('hidden');
                Object.values(frames).forEach(frame => frame.classList.add('hidden'));
                if (frames[step]) {
                    frames[step].classList.remove('hidden');
                }
            });
        };
    </script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f3f4f6; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

    <div id="login-modal" class="bg-white p-8 rounded-lg shadow-md w-96 z-50">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">수학 탐구 수업 입장</h2>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="student-id">학번</label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="student-id" type="text" placeholder="예: 10101">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="student-name">이름</label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="student-name" type="text" placeholder="예: 홍길동">
        </div>
        <button onclick="startClass()" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
            수업 입장하기
        </button>
    </div>

    <div id="loading" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-gray-100 z-40">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mb-4"></div>
        <p class="text-xl font-semibold text-gray-700">선생님의 화면 전환을 대기 중입니다...</p>
    </div>

<iframe id="frame-step1" class="hidden absolute inset-0" src="investigation-of-graph-shapes.html"></iframe>
    <iframe id="frame-step2" class="hidden absolute inset-0" src="filling-a-water-tank.html"></iframe>
    <iframe id="frame-step3" class="hidden absolute inset-0" src="drawing-graph-numerically.html"></iframe>

    <div id="frame-step4" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-gray-200 z-40">
        <div class="text-7xl mb-6 animate-bounce">👀</div>
        <h2 class="text-4xl font-black text-gray-800 mb-4">선생님을 주목해 주세요!</h2>
        <p class="text-lg text-gray-600 font-medium bg-white px-4 py-2 rounded-full shadow-sm border">현재 기기 조작이 일시 중지되었습니다.</p>
    </div>

</body>
</html>
