<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 실시간 탐구 수업</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // 파이어베이스 설정 (선생님의 정보로 수정하세요)
   const firebaseConfig = {
    apiKey: "AIzaSyCdTOKdNG0NXOGVt8Rhn6f6dYr7oc_XZ0A",
    authDomain: "meaning-of-graphs.firebaseapp.com",
    projectId: "meaning-of-graphs",
    storageBucket: "meaning-of-graphs.firebasestorage.app",
    messagingSenderId: "908366432588",
    appId: "1:908366432588:web:0596ebd12cfcbf63f227e9"
  };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const classStepRef = ref(database, 'currentStep');

        // 요소 가져오기
        const loadingEl = document.getElementById('loading');
        const frames = {
            1: document.getElementById('frame-step1'),
            2: document.getElementById('frame-step2'),
            3: document.getElementById('frame-step3')
        };

        // 실시간 데이터베이스 감시 (선생님이 단계를 바꾸면 실시간으로 실행됨)
        onValue(classStepRef, (snapshot) => {
            const step = snapshot.val() || 1; // 값이 없으면 기본 1단계
            
            // 로딩 메시지 숨기기
            loadingEl.classList.add('hidden');

            // 모든 프레임 숨기기
            Object.values(frames).forEach(frame => frame.classList.add('hidden'));

            // 선택된 단계의 프레임만 보여주기
            if (frames[step]) {
                frames[step].classList.remove('hidden');
            }
        });
    </script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center">

    <div id="loading" class="text-center z-50">
        <p class="text-xl font-bold text-slate-700 animate-pulse">수업 환경을 연결하고 있습니다...</p>
        <p class="text-sm text-slate-500 mt-2">선생님의 지시를 기다려 주세요.</p>
    </div>

<iframe id="frame-step1" src="investigation-of-graph-shapes.html" class="hidden"></iframe>
<iframe id="frame-step2" src="drawing-graph-numerically.html" class="hidden"></iframe>
<iframe id="frame-step3" src="filling-a-water-tank.html" class="hidden"></iframe>

</body>
</html>
