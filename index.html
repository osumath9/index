<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 실시간 탐구 수업</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

// 🔥 선생님의 파이어베이스 설정 정보로 수정해 주세요!
        const firebaseConfig = {
            apiKey: "AIzaSyCdTOKdNG0NXOGVt8Rhn6f6dYr7oc_XZ0A",
            authDomain: "meaning-of-graphs.firebaseapp.com",
            databaseURL: "https://meaning-of-graphs-default-rtdb.firebaseio.com",
            projectId: "meaning-of-graphs",
            storageBucket: "meaning-of-graphs.firebasestorage.app",
            messagingSenderId: "908366432588",
            appId: "1:908366432588:web:0596ebd12cfcbf63f227e9"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        let studentId = ""; 
        let studentName = "";
        let myStatusRef = null;

        // 로그인 확인 및 상태 관리 시작
        window.startClass = function() {
            const idInput = document.getElementById('student-id').value.trim();
            const nameInput = document.getElementById('student-name').value.trim();

            if (!idInput || !nameInput) {
                alert("학번과 이름을 모두 입력해 주세요.");
                return;
            }

            studentId = idInput;
            studentName = nameInput;
            
            // 학생 고유 키 생성
            const studentKey = `${studentId}_${studentName}`;
            myStatusRef = ref(database, `students/${studentKey}`);

            // 로그인 모달 닫고 로딩/대기 화면 표시
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            // 1. 온라인 상태 설정
            set(myStatusRef, {
                id: studentId,
                name: studentName,
                status: "online",
                lastActive: Date.now()
            });
            onDisconnect(myStatusRef).remove();

            // 2. 실시간 화면 전환 감지 이벤트 (백그라운드에서 조용히 감지)
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    set(myStatusRef, { id: studentId, name: studentName, status: "away", lastActive: Date.now() });
                } else {
                    set(myStatusRef, { id: studentId, name: studentName, status: "online", lastActive: Date.now() });
                }
            });

            // 3. 교사 리모컨 신호 감시
            const classStepRef = ref(database, 'currentStep');
            const loadingEl = document.getElementById('loading');
            const frames = {
                1: document.getElementById('frame-step1'),
                2: document.getElementById('frame-step2'),
                3: document.getElementById('frame-step3')
            };

            onValue(classStepRef, (snapshot) => {
                const step = snapshot.val() || 1;
                loadingEl.classList.add('hidden');
                Object.values(frames).forEach(frame => frame.classList.add('hidden'));
                if (frames[step]) {
                    frames[step].classList.remove('hidden');
                }
            });
        };
    </script>

        body, html { margin: 0; padding: 0; width: 100%; height: 1
